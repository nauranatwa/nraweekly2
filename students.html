<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>

    <h1 align="center">Students</h1>

    <table border="1" align="center" cellpadding="10" cellspacing="0">
        <tr>
        <td><a href="index.html">Home</a></td>
        <td><a href="biodata.html">Biodata</a></td>
        <td><a href="contact.html">Contact</a></td>
        <td><a href="data.html">Data</a></td>
        <td><a href="students.html">Students</a></td>
        </tr>
    </table>
    
    <br><br>

    <h2 align="center">Form Data Mahasiswa</h2>

    <form align="center">
        <table border="1" align="center" cellpadding="10" cellspacing="0">
            
            <tr>
                <td>Nama</td>
                <td><input type="text" name="nama"></td>
            </tr>

            <tr>
                <td>NIM</td>
                <td><input type="number" name="nim"></td>
            </tr>

            <tr>
                <td>Password</td>
                <td><input type="password" name="password"></td>
            </tr>

            <tr>
                <td>Email</td>
                <td><input type="email" name="email"></td>
            </tr>

            <tr>
                <td>No HP</td>
                <td><input type="tel" name="hp"></td>
            </tr>

            <tr>
                <td>Website Pribadi</td>
                <td><input type="url" name="website"></td>
            </tr>

            <tr>
                <td>Tanggal Lahir</td>
                <td><input type="date" name="tgl_lahir"></td>
            </tr>

            <tr>
                <td>Warna Favorit</td>
                <td><input type="color" name="warna"></td>
            </tr>

            <tr>
                <td>Tingkat Kepuasan</td>
                <td><input type="range" name="kepuasan" min="0" max="100"></td>
            </tr>

            <tr>
                <td>Jenis Kelamin</td>
                <td>
                    <input type="radio" name="jk" value="Laki-laki"> Laki-laki
                    <input type="radio" name="jk" value="Perempuan"> Perempuan
                </td>
            </tr>

            <tr>
                <td>Hobi</td>
                <td>
                    <input type="checkbox" name="hobi" value="Membaca"> Membaca
                    <input type="checkbox" name="hobi" value="Olahraga"> Olahraga
                    <input type="checkbox" name="hobi" value="Gaming"> Gaming
                </td>
            </tr>

            <tr>
                <td>Upload Foto</td>
                <td><input type="file" name="foto"></td>
            </tr>

            <tr>
                <td>Alamat</td>
                <td><textarea name="alamat"></textarea></td>
            </tr>

            <tr>
                <td>Jurusan</td>
                <td>
                    <select name="jurusan">
                        <option align="center" value="">Pilih Jurusan</option>
                        <option value="Informatika">Informatika</option>
                        <option value="Sistem Informasi">Teknologi Informasi</option>
                        <option value="Teknik Komputer">Teknik Sipil</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td colspan="2" align="center">
                    <input type="submit" value="Kirim">
                </td>
            </tr>

        </table>
    </form>

</body>
</html>
